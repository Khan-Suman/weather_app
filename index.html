<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <div class="weathercontainer">

        <div class="temparature">
            <p>15</p>
        </div>

        <div class="place_time">
             <p>Delhi</p>
             <span>08:38 - Friday 2024-04-26</span>
        </div>

        <div class="info">
            
            <p>Mist</p>
        </div>
    </div>
    </div>

    <nav>
        <form id="locationForm">
            <input type="text" placeholder="Seach for Location.." id="locationName">
            <button>Search</button>
        </form>
    </nav>
</body>
<script src="./script.js"></script>
</html>
